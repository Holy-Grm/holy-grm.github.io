<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Curriculum Vitae d'Olivier Germain - B.Sc. Informatique de Gestion">
    <title>Olivier Germain | Curriculum Vitae</title>

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
    <link rel="shortcut icon" href="../favicon.ico">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #ffffff;
            --bg-muted: #f8f9fa;
            --text-primary: #111827;
            --text-muted: #6b7280;
            --accent-color: #000000;
            --accent-light: rgba(0, 0, 0, 0.05);
            --border-color: #e5e7eb;
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --transition-speed: 0.3s;
            --border-radius: 16px;
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-muted);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER / NAVIGATION */
        .cv-header {
            height: 70px;
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            display: flex;
            align-items: center;
        }

        .cv-nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background: #ffffff;
            color: var(--text-primary);
            text-decoration: none;
            cursor: pointer;
            transition: all var(--transition-speed);
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .btn-back:hover {
            background-color: var(--bg-muted);
            transform: translateX(-2px);
        }

        .cv-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            margin: 0;
            text-align: center;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 999px;
            background-color: var(--accent-color);
            color: #ffffff;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all var(--transition-speed);
        }

        .btn-download:hover {
            background-color: #333333;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
        }

        /* MAIN PREVIEW CONTAINER */
        .cv-container {
            margin-top: 70px;
            height: calc(100vh - 70px);
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .cv-card {
            width: 100%;
            max-width: 950px;
            height: 100%;
            background-color: #ffffff;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .pdf-embed {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* OPTIMISATION MOBILE PREVIEW BANNER */
        .mobile-view-option {
            display: none;
            background: #ffffff;
            padding: 0.85rem 1rem;
            border-top: 1px solid var(--border-color);
            text-align: center;
            z-index: 10;
        }

        .btn-mobile-open {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            max-width: 320px;
            padding: 0.65rem 1rem;
            background-color: var(--bg-muted);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: all var(--transition-speed);
        }

        .btn-mobile-open:hover {
            background-color: var(--accent-light);
        }

        /* FALLBACK DESKTOP/MOBILE */
        .pdf-fallback {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
            text-align: center;
            height: 100%;
            color: var(--text-primary);
            background: #ffffff;
        }

        .fallback-icon {
            width: 48px;
            height: 48px;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .pdf-fallback h2 {
            font-size: 1.35rem;
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        .pdf-fallback p {
            color: var(--text-muted);
            max-width: 420px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* RESPONSIVE LAYOUT */
        @media (max-width: 768px) {
            body {
                overflow: auto; /* Allow scrolling if layout shifts */
            }

            .cv-container {
                padding: 0.75rem;
                height: calc(100vh - 70px);
            }

            .cv-card {
                border-radius: 12px;
            }

            .cv-title {
                display: none; /* Hide centered title on smaller displays to avoid overlap */
            }

            .cv-nav-container {
                padding: 0 1rem;
            }

            .mobile-view-option {
                display: block;
            }
        }
    </style>
</head>

<body>

    <!-- NAV / HEADER -->
    <header class="cv-header">
        <div class="cv-nav-container">
            <a href="../" class="btn-back" id="btn-back">
                <i data-lucide="arrow-left"></i>
                <span>Retour</span>
            </a>
            <h1 class="cv-title">Curriculum Vitae — Olivier Germain</h1>
            <a href="../assets/CV_Olivier_Germain.pdf" download="CV_Olivier_Germain.pdf" class="btn-download" id="btn-download">
                <i data-lucide="download"></i>
                <span>Télécharger</span>
            </a>
        </div>
    </header>

    <!-- CV PREVIEW CONTAINER -->
    <div class="cv-container">
        <div class="cv-card">
            <object data="../assets/CV_Olivier_Germain.pdf" type="application/pdf" class="pdf-embed">
                <iframe src="../assets/CV_Olivier_Germain.pdf" class="pdf-embed">
                    <div class="pdf-fallback">
                        <i data-lucide="file-text" class="fallback-icon"></i>
                        <h2>Aperçu non pris en charge</h2>
                        <p>Votre navigateur ou appareil ne permet pas d'afficher directement les fichiers PDF intégrés.</p>
                        <a href="../assets/CV_Olivier_Germain.pdf" download="CV_Olivier_Germain.pdf" class="btn-download">
                            <i data-lucide="download"></i>
                            <span>Télécharger le CV</span>
                        </a>
                    </div>
                </iframe>
            </object>

            <!-- Mobile action to open in full screen (using native PDF reader of the mobile browser) -->
            <div class="mobile-view-option">
                <a href="../assets/CV_Olivier_Germain.pdf" target="_blank" class="btn-mobile-open">
                    <i data-lucide="external-link"></i>
                    <span>Ouvrir en plein écran</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
