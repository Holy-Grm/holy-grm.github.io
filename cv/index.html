<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Curriculum Vitae d'Olivier Germain - B.Sc. Informatique de Gestion">
    <title>Olivier Germain | Curriculum Vitae</title>

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
    <link rel="shortcut icon" href="../favicon.ico">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #0f0f11;
            overflow: hidden;
        }

        .cv-wrapper {
            width: 100%;
            height: 100%;
        }

        .pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* FALLBACK SCREEN */
        .fallback-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            color: #ffffff;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .fallback-icon {
            width: 48px;
            height: 48px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 1.5rem;
        }

        .fallback-container h2 {
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .fallback-container p {
            color: rgba(255, 255, 255, 0.5);
            max-width: 380px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .fallback-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 999px;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            transition: all 0.3s;
        }

        .fallback-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

<body>
    <!-- CV PREVIEW CONTAINER -->
    <div class="cv-wrapper">
        <object data="../assets/CV_Olivier_Germain.pdf" type="application/pdf" class="pdf-viewer">
            <iframe src="../assets/CV_Olivier_Germain.pdf" class="pdf-viewer">
                <div class="fallback-container">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="fallback-icon"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
                    <h2>Aperçu non disponible</h2>
                    <p>Votre appareil ne prend pas en charge l'affichage direct des fichiers PDF.</p>
                    <a href="../assets/CV_Olivier_Germain.pdf" download="CV_Olivier_Germain.pdf" class="fallback-btn">
                        <span>Télécharger le PDF</span>
                    </a>
                </div>
            </iframe>
        </object>
    </div>
</body>

</html>
