<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Curriculum Vitae d'Olivier Germain - B.Sc. Informatique de Gestion">
    <title>Olivier Germain | Curriculum Vitae</title>

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
    <link rel="shortcut icon" href="../favicon.ico">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --transition-speed: 0.3s;
            --bg-dark: #0f0f11;
            --border-color: rgba(255, 255, 255, 0.15);
            --btn-bg: rgba(15, 15, 17, 0.75);
            --btn-bg-hover: rgba(15, 15, 17, 0.95);
            --shadow-btn: 0 4px 16px rgba(0, 0, 0, 0.35);
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* FULL SCREEN WRAPPER */
        .cv-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            background-color: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ULTRA MINIMALIST FLOATING BUTTONS */
        .floating-btn {
            position: fixed;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--btn-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            color: #ffffff;
            text-decoration: none;
            z-index: 9999;
            cursor: pointer;
            transition: all var(--transition-speed);
            box-shadow: var(--shadow-btn);
        }

        .floating-btn:hover {
            background-color: var(--btn-bg-hover);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
        }

        .floating-btn i {
            width: 20px;
            height: 20px;
        }

        .btn-close {
            top: 1.5rem;
            left: 1.5rem;
        }

        .btn-download {
            top: 1.5rem;
            right: 1.5rem;
        }

        /* MOBILE FLOATING OPTIMIZATION LINK */
        .mobile-native-btn {
            display: none;
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background-color: var(--btn-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            color: #ffffff;
            padding: 0.65rem 1.25rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            box-shadow: var(--shadow-btn);
            align-items: center;
            gap: 0.5rem;
            transition: all var(--transition-speed);
        }

        .mobile-native-btn:hover {
            background-color: var(--btn-bg-hover);
            transform: translate(-50%, -2px);
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 768px) {
            .floating-btn {
                width: 42px;
                height: 42px;
            }

            .floating-btn i {
                width: 18px;
                height: 18px;
            }

            .btn-close {
                top: 1rem;
                left: 1rem;
            }

            .btn-download {
                top: 1rem;
                right: 1rem;
            }

            .mobile-native-btn {
                display: inline-flex;
            }
        }

        /* FALLBACK SCREEN */
        .fallback-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            color: #ffffff;
            background-color: var(--bg-dark);
            height: 100%;
            width: 100%;
        }

        .fallback-icon {
            width: 48px;
            height: 48px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 1.5rem;
        }

        .fallback-container h2 {
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .fallback-container p {
            color: rgba(255, 255, 255, 0.5);
            max-width: 380px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .fallback-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 999px;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            transition: all var(--transition-speed);
        }

        .fallback-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

<body>

    <!-- FLOATING ACTIONS -->
    <a href="../" class="floating-btn btn-close" aria-label="Fermer" title="Retour au site">
        <i data-lucide="x"></i>
    </a>

    <a href="../assets/CV_Olivier_Germain.pdf" download="CV_Olivier_Germain.pdf" class="floating-btn btn-download" aria-label="Télécharger le CV" title="Télécharger le CV">
        <i data-lucide="download"></i>
    </a>

    <!-- MOBILE HELPER TO OPEN DIRECTLY IN NEW TAB FOR BEST NATIVE FEEL -->
    <a href="../assets/CV_Olivier_Germain.pdf" target="_blank" class="mobile-native-btn">
        <i data-lucide="external-link"></i>
        <span>Plein écran</span>
    </a>

    <!-- CV PREVIEW CONTAINER -->
    <div class="cv-wrapper">
        <object data="../assets/CV_Olivier_Germain.pdf" type="application/pdf" class="pdf-viewer">
            <iframe src="../assets/CV_Olivier_Germain.pdf" class="pdf-viewer">
                <div class="fallback-container">
                    <i data-lucide="file-text" class="fallback-icon"></i>
                    <h2>Aperçu non disponible</h2>
                    <p>Votre appareil ne prend pas en charge l'affichage direct des fichiers PDF.</p>
                    <a href="../assets/CV_Olivier_Germain.pdf" download="CV_Olivier_Germain.pdf" class="fallback-btn">
                        <i data-lucide="download"></i>
                        <span>Télécharger le PDF</span>
                    </a>
                </div>
            </iframe>
        </object>
    </div>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
